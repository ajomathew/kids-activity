<body class="theme-retrocast">

    <div class="top-bar">
        <div class="custom-select" id="customThemeSelect">
            <div class="select-selected" id="selectSelected">
                <span id="selectedThemeName">Select Theme</span>
                <div class="theme-circles" id="selectedThemeCircles"></div>
            </div>
            <div class="select-items select-hide" id="selectItems"></div>
        </div>
    </div>

    <div class="container">
        <h1>📚 English Spelling Flashcard</h1>

        <div class="input-section" id="inputSection">
            <label for="paragraph">Enter an English paragraph or story:</label>
            <textarea id="paragraph" placeholder="Paste your story or paragraph here..."></textarea>
            <button onclick="createFlashcards()">Create Flashcards</button>
        </div>

        <div class="flashcard-section" id="flashcardSection">
            <div class="progress">
                <span id="currentCard">1</span> / <span id="totalCards">0</span>
            </div>

            <div class="flashcard" id="flashcard" onclick="handleCardClick()" style="cursor: pointer;">
                <div class="card-word" id="cardWord">Loading...</div>
                <div class="card-hint" id="cardHint"></div>
            </div>

            <div class="navigation">
                <button class="nav-btn" onclick="previousCard()" id="prevBtn">← Previous</button>
                <button class="nav-btn" onclick="nextCard()" id="nextBtn">Next →</button>
            </div>

            <button onclick="resetApp()" style="margin-top: 30px;">Start Over</button>
        </div>

        <div id="emptyMessage" class="empty-message">
            No flashcards yet. Add text to get started!
        </div>
    </div>

    <script>
        let words = [];
        let currentIndex = 0;
        let isFlipped = false;
        let isSpoken = false;


        

        function populateThemes() {
            const itemsContainer = document.getElementById('selectItems');
            itemsContainer.innerHTML = '';
            themesData.forEach(theme => {
                const item = document.createElement('div');
                item.className = 'select-item';
                item.innerHTML = `
                    <span>${theme.name}</span>
                    <div class="theme-circles">
                        <div class="theme-circle" style="background-color: ${theme.colors.bg}"></div>
                        <div class="theme-circle" style="background-color: ${theme.colors.main}"></div>
                        <div class="theme-circle" style="background-color: ${theme.colors.sub}"></div>
                    </div>
                `;
                item.addEventListener('click', () => {
                    setTheme(theme.value);
                    closeAllSelect();
                });
                itemsContainer.appendChild(item);
            });
        }

        function updateSelectedDisplay(themeValue) {
            const theme = themesData.find(t => t.value === themeValue) || themesData[0];
            document.getElementById('selectedThemeName').textContent = theme.name;
            document.getElementById('selectedThemeCircles').innerHTML = `
                <div class="theme-circle" style="background-color: ${theme.colors.bg}"></div>
                <div class="theme-circle" style="background-color: ${theme.colors.main}"></div>
                <div class="theme-circle" style="background-color: ${theme.colors.sub}"></div>
            `;
        }

        document.getElementById('selectSelected').addEventListener('click', function (e) {
            e.stopPropagation();
            document.getElementById('selectItems').classList.toggle('select-hide');
        });

        function closeAllSelect() {
            document.getElementById('selectItems').classList.add('select-hide');
        }

        document.addEventListener('click', closeAllSelect);

        function setTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('flashcard-theme', theme);
            updateSelectedDisplay(theme);
        }

        window.addEventListener('DOMContentLoaded', function () {
            populateThemes();
            const saved = localStorage.getItem('flashcard-theme') || themesData[0].value;
            setTheme(saved);
        });


        function createFlashcards() {
            const paragraph = document.getElementById('paragraph').value.trim();
            if (!paragraph) { alert('Please enter some text!'); return; }

            const skipWords = new Set(['a', 'an', 'and', 'the', 'is', 'it', 'to', 'of', 'off', 'or', 'in', 'on', 'at', 'by', 'up', 'do', 'go', 'no', 'so', 'we', 'he', 'me', 'my', 'as', 'if', 'be', 'am', 'are', 'was', 'were', 'has', 'have', 'had', 'that', 'this', 'what', 'which', 'who', 'when', 'where', 'why', 'how', 'but', 'with', 'from', 'for', 'out', 'not', 'can', 'could', 'would', 'should', 'will', 'all', 'each', 'every', 'both', 'few', 'more', 'most', 'other', 'some', 'such', 'too', 'very']);

            words = paragraph.toLowerCase().match(/\b[a-z]+\b/g) || [];
            words = [...new Set(words)].filter(w => !skipWords.has(w)).sort();

            if (words.length === 0) { alert('No valid words found!'); return; }

            currentIndex = 0;
            isFlipped = false;
            isSpoken = false;

            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('flashcardSection').classList.add('active');
            document.getElementById('emptyMessage').style.display = 'none';
            document.getElementById('totalCards').textContent = words.length;
            displayCard();
        }

        function displayCard() {
            const word = words[currentIndex];
            document.getElementById('cardWord').textContent = isFlipped ? word : '🔊';
            
            const hint = document.getElementById('cardHint');
            if (!isFlipped && !isSpoken) {
                hint.textContent = "Click to speak the word";
            } else if (!isFlipped && isSpoken) {
                hint.textContent = "Click to flip";
            } else if (isFlipped && currentIndex < words.length - 1) {
                hint.textContent = "Click to move to next word";
            } else {
                hint.textContent = "All done! Click Start Over.";
            }
            
            document.getElementById('currentCard').textContent = currentIndex + 1;
            updateNavigation();
        }

        function toggleCard() {
            isFlipped = !isFlipped;
            displayCard();
        }

        function handleCardClick() {
            if (!isSpoken && !isFlipped) {
                speakWord();
                isSpoken = true;
                displayCard(); // Update hint
            } else if (isSpoken && !isFlipped) {
                toggleCard();
            } else if (isFlipped) {
                if (currentIndex < words.length - 1) {
                    nextCard();
                }
            }
        }

        function speakWord() {
            const word = words[currentIndex];
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.rate = 0.9;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            const voices = window.speechSynthesis.getVoices();

            // Prioritize high-quality English voices (e.g., Edge Natural, Premium, Google)
            const voice = voices.find(v =>
                v.lang.startsWith('en') && (v.name.includes('Natural') || v.name.includes('Premium') || v.name.includes('Google'))
            ) || voices.find(v => v.lang.startsWith('en')) || voices[0];

            if (voice) utterance.voice = voice;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function nextCard() {
            if (currentIndex < words.length - 1) { currentIndex++; isFlipped = false; isSpoken = false; displayCard(); }
        }

        function previousCard() {
            if (currentIndex > 0) { currentIndex--; isFlipped = false; isSpoken = false; displayCard(); }
        }

        function updateNavigation() {
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === words.length - 1;
        }

        function resetApp() {
            words = []; currentIndex = 0; isFlipped = false; isSpoken = false;
            document.getElementById('paragraph').value = '';
