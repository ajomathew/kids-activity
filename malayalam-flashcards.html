<!DOCTYPE html>
<html lang="ml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>മലയാളം Flash Cards</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@300;400;600;700&family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --surface2: #1e1e1e;
            --border: #2a2a2a;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --cream: #f5f0e8;
            --muted: #666;
            --text: #e8e2d8;
            --red: #e05252;
            --teal: #4ecdc4;
            --radius: 16px;
        }

        /* Light mode overrides */
        :root.light {
            --bg: #f7f3ec;
            --surface: #ffffff;
            --surface2: #f0ebe0;
            --border: #ddd5c4;
            --gold: #a07828;
            --gold-light: #b8922e;
            --cream: #1a1208;
            --muted: #999;
            --text: #2a2010;
            --red: #cc3333;
            --teal: #2a9d95;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            transition: background 0.3s ease;
        }

        body {
            transition: background 0.3s ease, color 0.3s ease;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ambient background */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(ellipse, rgba(201, 168, 76, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        header {
            width: 100%;
            max-width: 800px;
            padding: 40px 24px 20px;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        /* Theme toggle */
        .theme-toggle {
            position: absolute;
            top: 18px;
            right: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 999px;
            padding: 6px 14px 6px 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .theme-toggle:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .theme-icon {
            font-size: 15px;
            line-height: 1;
            transition: transform 0.4s ease;
        }

        .theme-toggle:hover .theme-icon {
            transform: rotate(20deg);
        }

        .logo-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.25em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        h1 {
            font-family: 'Noto Sans Malayalam', serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        /* Mode selector styles are now inline — see .mode-bar-inline */

        /* Main container */
        main {
            width: 100%;
            max-width: 800px;
            padding: 24px;
            position: relative;
            z-index: 1;
            flex: 1;
        }

        /* Collapsible input section */
        .input-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .input-section:hover {
            border-color: #333;
        }

        .input-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .input-toggle:hover {
            color: var(--gold);
        }

        .input-toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-preview {
            font-family: 'Noto Sans Malayalam', sans-serif;
            font-size: 11px;
            letter-spacing: 0;
            color: var(--muted);
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-transform: none;
        }

        .chevron {
            font-size: 10px;
            transition: transform 0.3s ease;
            color: var(--muted);
            flex-shrink: 0;
        }

        .input-section.open .chevron {
            transform: rotate(180deg);
        }

        .input-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, padding 0.3s ease;
            padding: 0 18px;
        }

        .input-section.open .input-body {
            max-height: 400px;
            padding: 0 18px 18px;
        }

        .input-label {
            font-size: 11px;
            letter-spacing: 0.2em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            color: var(--cream);
            font-family: 'Noto Sans Malayalam', sans-serif;
            font-size: 1.05rem;
            line-height: 1.8;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.2s;
            outline: none;
        }

        textarea::placeholder {
            color: var(--muted);
            font-size: 0.9rem;
        }

        textarea:focus {
            border-color: var(--gold);
        }

        .btn-generate {
            margin-top: 12px;
            width: 100%;
            padding: 13px;
            background: var(--gold);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.12em;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-generate:hover {
            background: var(--gold-light);
            transform: translateY(-1px);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        /* Inline mode bar — sits just above cardArea */
        .mode-bar-inline {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 8px 22px;
            border-radius: 999px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.22s ease;
        }

        .mode-btn:hover {
            border-color: var(--gold);
            color: var(--gold-light);
        }

        .mode-btn.active {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--bg);
            font-weight: 600;
        }

        /* Progress / counter bar */
        .progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
        }

        .counter-label {
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--muted);
            white-space: nowrap;
        }

        .counter-label span {
            color: var(--gold-light);
            font-weight: 600;
        }

        .progress-wrap {
            flex: 1;
            background: var(--surface2);
            border-radius: 999px;
            height: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--teal));
            border-radius: 999px;
            transition: width 0.4s ease;
        }

        /* Single card stage */
        .card-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* Individual card */
        .flash-card {
            width: min(340px, 90vw);
            height: min(420px, 55vw + 160px);
            perspective: 900px;
            cursor: pointer;
            animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px;
        }

        .flash-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            inset: 0;
            border-radius: 20px;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 28px 24px 20px;
            gap: 0;
        }

        .card-front {
            background: var(--surface);
            border: 1.5px solid var(--border);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .flash-card:hover .card-front {
            border-color: rgba(201, 168, 76, 0.5);
            box-shadow: 0 0 40px rgba(201, 168, 76, 0.08);
        }

        .card-back {
            background: linear-gradient(145deg, #1c1608, #0f0d07);
            border: 1.5px solid var(--gold);
            transform: rotateY(180deg);
            overflow: hidden;
            box-shadow: 0 0 60px rgba(201, 168, 76, 0.12);
        }

        :root.light .card-back {
            background: linear-gradient(145deg, #fdf6e3, #f5ecd0);
            box-shadow: 0 0 40px rgba(160, 120, 40, 0.1);
        }

        /* The main word/letter — auto-sizing */
        .card-char {
            font-family: 'Noto Sans Malayalam', sans-serif;
            font-weight: 600;
            color: var(--gold-light);
            line-height: 1.25;
            text-align: center;
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            /* fluid: big for short words, smaller for long */
            font-size: clamp(1.2rem, 8vw, 3.8rem);
            /* container-relative shrink via JS */
        }

        .card-back .card-char {
            color: var(--gold-light);
        }

        .card-hint {
            margin-top: 14px;
            font-size: 10px;
            letter-spacing: 0.18em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .card-back .card-hint {
            color: rgba(201, 168, 76, 0.5);
        }

        .card-tag {
            position: absolute;
            top: 14px;
            right: 16px;
            font-size: 8px;
            letter-spacing: 0.15em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .card-num {
            position: absolute;
            top: 12px;
            left: 14px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--cream);
            opacity: 0.75;
        }

        /* Spell-out row */
        .spell-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            align-items: center;
            padding: 12px 8px 0;
            max-width: 100%;
        }

        .spell-letter {
            font-family: 'Noto Sans Malayalam', sans-serif;
            font-size: 1rem;
            color: var(--gold);
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid rgba(201, 168, 76, 0.25);
            border-radius: 6px;
            padding: 3px 8px;
            opacity: 0;
            transform: translateY(8px) scale(0.8);
            animation: letterPop 0.25s ease forwards;
            white-space: nowrap;
        }

        @keyframes letterPop {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .spell-dot {
            font-size: 0.7rem;
            color: var(--muted);
            opacity: 0;
            animation: letterPop 0.2s ease forwards;
        }

        /* Speak button */
        .speak-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 14px;
            padding: 8px 20px;
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 999px;
            color: var(--gold);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0;
            animation: letterPop 0.3s ease 650ms forwards;
        }

        .speak-btn:hover {
            background: rgba(201, 168, 76, 0.22);
            border-color: var(--gold);
            transform: scale(1.05);
        }

        .speak-btn.speaking {
            background: var(--gold);
            color: #0d0d0d;
            border-color: var(--gold);
        }

        .speak-btn svg {
            width: 13px;
            height: 13px;
            fill: currentColor;
            flex-shrink: 0;
        }

        @keyframes wave {

            0%,
            100% {
                transform: scaleY(1);
            }

            50% {
                transform: scaleY(2.2);
            }
        }

        .wave-bar {
            display: inline-block;
            width: 3px;
            height: 8px;
            background: currentColor;
            border-radius: 2px;
            margin: 0 1px;
            animation: wave 0.6s ease-in-out infinite;
        }

        .wave-bar:nth-child(2) {
            animation-delay: 0.12s;
        }

        .wave-bar:nth-child(3) {
            animation-delay: 0.24s;
        }

        /* Nav controls */
        .nav-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(201, 168, 76, 0.08);
            transform: scale(1.08);
        }

        .nav-btn:disabled {
            opacity: 0.2;
            cursor: default;
        }

        .nav-dots {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .nav-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-dot.active {
            background: var(--gold);
            transform: scale(1.4);
        }

        .nav-dot.seen {
            background: var(--teal);
            opacity: 0.6;
        }

        /* Shuffle btn under nav */
        .shuffle-row {
            display: flex;
            gap: 10px;
        }

        .ctrl-btn {
            padding: 8px 18px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ctrl-btn:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        /* Animate card in from side */
        @keyframes cardIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(16px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(60px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-60px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .flash-card.enter-right {
            animation: slideInRight 0.3s cubic-bezier(0.34, 1.3, 0.64, 1) both;
        }

        .flash-card.enter-left {
            animation: slideInLeft 0.3s cubic-bezier(0.34, 1.3, 0.64, 1) both;
        }

        /* Empty / placeholder */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--muted);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 13px;
            letter-spacing: 0.08em;
            line-height: 1.8;
        }

        /* Section heading */
        .section-title {
            font-size: 10px;
            letter-spacing: 0.25em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        footer {
            padding: 24px;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 500px) {
            .flash-card {
                width: 88vw;
                height: 56vw + 100px;
            }

            h1 {
                font-size: 1.8rem;
            }
        }



        /* Theme Dropdown Styles */
        .theme-dropdown-container {
            position: relative;
            font-family: monospace;
        }

        .theme-dropdown-btn {
            background: transparent;
            border: 1.5px solid currentColor;
            color: inherit;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .theme-dropdown-btn:hover {
            opacity: 0.8;
        }

        .theme-dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: #1e1e2e;
            border: 1px solid #313244;
            border-radius: 8px;
            width: 300px;
            max-height: 250px;
            display: none;
            flex-direction: column;
            z-index: 9999;
            color: #cdd6f4;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .theme-dropdown-menu.show {
            display: flex;
        }

        .theme-search-wrapper {
            padding: 10px;
            border-bottom: 1px solid #313244;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-search-wrapper input {
            background: transparent;
            border: none;
            color: #cdd6f4;
            outline: none;
            width: 100%;
            font-family: monospace;
            font-size: 14px;
        }

        .theme-list {
            overflow-y: auto;
            padding: 5px 0;
        }

        .theme-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 13px;
            color: #cdd6f4;
        }

        .theme-item:hover,
        .theme-item.active {
            background: #313244;
        }

        .theme-circles {
            display: flex;
            gap: 4px;
            background: #11111b;
            padding: 4px;
            border-radius: 12px;
        }

        .theme-circle {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        \n
    </style>
    <script src="themes.js"></script>
    <script src="analytics.js"></script>
</head>

<body>

    <header>
        <div class="logo-label">Learn Malayalam</div>
        <h1>മലയാളം Flash Cards</h1>
        <p class="subtitle">Paste a paragraph · tap to flip · hear it spoken</p>
    </header>

    <main>
        <!-- Collapsible input -->
        <div class="input-section open" id="inputSection">
            <button class="input-toggle" onclick="toggleInput()">
                <span class="input-toggle-label">
                    ✎ &nbsp;Malayalam Paragraph
                    <span class="input-preview" id="inputPreview"></span>
                </span>
                <span class="chevron">▼</span>
            </button>
            <div class="input-body">
                <label class="input-label" for="mlInput">Enter text below</label>
                <textarea id="mlInput"
                    placeholder="ഇവിടെ മലയാളം ഖണ്ഡിക ടൈപ്പ് ചെയ്യുക...&#10;&#10;Example: കേരളം ദൈവത്തിന്റെ സ്വന്തം നാട് ആണ്. &#10;ഇവിടെ പ്രകൃതി ഭംഗി ഒരുപാട് ഉണ്ട്."></textarea>
                <button class="btn-generate" onclick="generate()">
                    &#9654; Generate Flash Cards
                </button>
            </div>
        </div>

        <!-- Mode bar — always visible, sits just above the card area -->
        <div class="mode-bar-inline" id="modeBarInline">
            <button class="mode-btn active" id="btn-words" onclick="setMode('words')">
                &#9632; Word Cards
            </button>
            <button class="mode-btn" id="btn-letters" onclick="setMode('letters')">
                &#9650; Letter Cards
            </button>
        </div>

        <div style="display: flex; justify-content: center; margin-bottom: 20px;">
            <div class="theme-dropdown-container" id="themeDropdownContainer">
                <button class="theme-dropdown-btn" onclick="toggleThemeMenu(event)">
                    <span id="currentThemeName">Theme</span>
                    <div class="theme-circles" id="currentThemeCircles" style="background:transparent;padding:0"></div>
                </button>
                <div class="theme-dropdown-menu" id="themeMenu" onclick="event.stopPropagation()">
                    <div class="theme-search-wrapper">
                        <span>🔍</span>
                        <input type="text" id="themeSearch" placeholder="Theme..." oninput="filterThemes()">
                    </div>
                    <div class="theme-list" id="themeList"></div>
                </div>
            </div>
        </div>

        <div id="cardArea"></div>
    </main>

    <footer>tap to flip &nbsp;·&nbsp; 🔊 tap speaker to hear &nbsp;·&nbsp; മലയാളം</footer>

    <script>
        let mode = 'words';
        let cards = [];
        let current = 0;
        let isFlipped = false;
        let seen = new Set();
        let lastDir = 1; // 1 = forward, -1 = back

        // ── Theme toggle ──────────────────────────────────────────
        let isLight = false;

        function toggleTheme() {
            isLight = !isLight;
            document.documentElement.classList.toggle('light', isLight);
            document.getElementById('themeIcon').textContent = isLight ? '☀️' : '🌙';
            document.getElementById('themeLabel').textContent = isLight ? 'Dark' : 'Light';
            localStorage.setItem('ml-theme', isLight ? 'light' : 'dark');
        }

        // Restore saved preference
        (function () {
            const saved = localStorage.getItem('ml-theme');
            if (saved === 'light') {
                isLight = true;
                document.documentElement.classList.add('light');
                document.addEventListener('DOMContentLoaded', () => {
                    const icon = document.getElementById('themeIcon');
                    const label = document.getElementById('themeLabel');
                    if (icon) icon.textContent = '☀️';
                    if (label) label.textContent = 'Dark';
                });
            }
        })();
        function toggleInput() {
            const sec = document.getElementById('inputSection');
            sec.classList.toggle('open');
        }

        function collapseInput() {
            const sec = document.getElementById('inputSection');
            sec.classList.remove('open');
            // Show preview text in toggle bar
            const val = document.getElementById('mlInput').value.trim();
            const preview = document.getElementById('inputPreview');
            if (preview) preview.textContent = val.length > 30 ? '· ' + val.slice(0, 30) + '…' : val ? '· ' + val : '';
        }

        // ── TTS ───────────────────────────────────────────────────
        const synth = window.speechSynthesis;
        let mlVoice = null;

        function loadVoices() {
            const v = synth ? synth.getVoices() : [];
            mlVoice = v.find(x => x.lang === 'ml-IN' || x.lang === 'ml')
                || v.find(x => x.lang.startsWith('ml'))
                || v.find(x => x.lang === 'hi-IN')
                || v.find(x => x.lang.startsWith('en-IN'))
                || null;
        }
        if (synth) { loadVoices(); if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices; }

        function speak(text, btnEl) {
            if (!synth) return;
            synth.cancel();
            const utt = new SpeechSynthesisUtterance(text);
            utt.lang = 'ml-IN'; utt.rate = 0.82; utt.pitch = 1;
            if (mlVoice) utt.voice = mlVoice;
            if (btnEl) {
                btnEl.classList.add('speaking');
                btnEl.innerHTML = `<span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span>`;
                utt.onend = utt.onerror = () => { btnEl.classList.remove('speaking'); btnEl.innerHTML = speakerIcon() + ' hear it'; };
            }
            synth.speak(utt);
        }

        function speakerIcon() {
            return `<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`;
        }

        // ── Helpers ───────────────────────────────────────────────
        function getGraphemes(text) {
            if (typeof Intl !== 'undefined' && Intl.Segmenter) {
                const seg = new Intl.Segmenter('ml', { granularity: 'grapheme' });
                return [...seg.segment(text)].map(s => s.segment);
            }
            return [...text];
        }

        function tokenize(text, m) {
            if (m === 'words') {
                return text.split(/[\s\u200c\u200d،،؛؟।॥,.!?;:\-–—"'"'()\[\]{}]+/)
                    .filter(w => w.length > 0 && /[\u0D00-\u0D7F]/.test(w));
            }
            const chars = getGraphemes(text).filter(c => /[\u0D00-\u0D7F]/.test(c));
            const seenSet = new Set(), unique = [];
            for (const c of chars) { if (!seenSet.has(c)) { seenSet.add(c); unique.push(c); } }
            return unique;
        }

        function buildSpellRow(word) {
            const letters = getGraphemes(word).filter(c => /[\u0D00-\u0D7F]/.test(c));
            if (letters.length <= 1) return '';
            return letters.map((l, idx) => {
                const d = 320 + idx * 110, dd = d + 70, last = idx === letters.length - 1;
                return `<span class="spell-letter" style="animation-delay:${d}ms">${l}</span>${!last ? `<span class="spell-dot" style="animation-delay:${dd}ms">·</span>` : ''}`;
            }).join('');
        }

        // ── Auto font-size ─────────────────────────────────────────
        function fitText(el) {
            if (!el) return;
            const container = el.closest('.card-front, .card-back');
            if (!container) return;
            const maxW = container.clientWidth - 56;
            const maxH = container.clientHeight * 0.45;
            let size = 64;
            el.style.fontSize = size + 'px';
            while ((el.scrollWidth > maxW || el.scrollHeight > maxH) && size > 18) {
                size -= 2;
                el.style.fontSize = size + 'px';
            }
        }

        // ── UI actions ─────────────────────────────────────────────
        function setMode(m) {
            mode = m;
            document.getElementById('btn-words').classList.toggle('active', m === 'words');
            document.getElementById('btn-letters').classList.toggle('active', m === 'letters');
            const val = document.getElementById('mlInput').value.trim();
            if (val) generate();
        }

        function generate() {
            const val = document.getElementById('mlInput').value.trim();
            if (!val) { showEmpty('Please enter some Malayalam text above.'); return; }
            if (!/[\u0D00-\u0D7F]/.test(val)) { showEmpty('Please enter text with Malayalam characters.'); return; }
            cards = tokenize(val, mode);
            if (cards.length === 0) { showEmpty('No Malayalam ' + (mode === 'words' ? 'words' : 'letters') + ' found.'); return; }
            current = 0; isFlipped = false; seen = new Set(); lastDir = 1;
            // Collapse input and show preview
            collapseInput();
            renderStage();
        }

        function goNext() {
            if (current >= cards.length - 1) return;
            seen.add(current);
            current++; isFlipped = false; lastDir = 1;
            renderCard('enter-right');
            updateProgress();
        }

        function goPrev() {
            if (current <= 0) return;
            current--; isFlipped = false; lastDir = -1;
            renderCard('enter-left');
            updateProgress();
        }

        function flipCurrent() {
            // If already flipped (card has been seen), next tap advances to next card
            if (isFlipped) {
                if (current < cards.length - 1) {
                    goNext();
                }
                return;
            }

            // First tap: flip the card
            isFlipped = true;
            const el = document.querySelector('.flash-card');
            if (!el) return;
            el.classList.add('flipped');

            // Spell row
            if (mode === 'words') {
                const sc = el.querySelector('.spell-row');
                if (sc) sc.innerHTML = buildSpellRow(cards[current]);
            }
            // Fit text on back
            setTimeout(() => { fitText(el.querySelector('.card-back .card-char')); }, 50);
            // Auto-speak
            setTimeout(() => speak(cards[current], null), 520);
            seen.add(current);
            updateProgress();

            // Update hint text to signal next tap advances
            setTimeout(() => {
                const hint = el.querySelector('.card-back .card-hint');
                if (hint && current < cards.length - 1) hint.textContent = '→ tap to continue';
            }, 700);
        }

        function speakCurrent(event) {
            event.stopPropagation();
            speak(cards[current], event.currentTarget);
        }

        function shuffleCards() {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            current = 0; isFlipped = false; seen = new Set();
            renderCard('enter-right');
            updateProgress();
        }

        // ── Render ─────────────────────────────────────────────────
        function renderStage() {
            const label = mode === 'words' ? 'WORDS' : 'UNIQUE LETTERS';
            const hasTTS = !!synth;
            const noTTS = hasTTS ? '' : '<span style="color:var(--red)">⚠ No TTS</span>';

            const html = `
      <div class="progress-header">
        <span class="counter-label" id="counterLabel"><span>1</span> / ${cards.length}</span>
        <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        ${noTTS}
      </div>
      <div class="card-stage" id="cardStage"></div>
      <div class="nav-row" id="navRow">
        <button class="nav-btn" id="prevBtn" onclick="goPrev()" ${current === 0 ? 'disabled' : ''}>&#8592;</button>
        <div class="nav-dots" id="navDots"></div>
        <button class="nav-btn" id="nextBtn" onclick="goNext()" ${current === cards.length - 1 ? 'disabled' : ''}>&#8594;</button>
      </div>
      <div class="shuffle-row">
        <button class="ctrl-btn" onclick="shuffleCards()">⇄ Shuffle</button>
      </div>
    `;
            document.getElementById('cardArea').innerHTML = html;
            renderCard('enter-right');
        }

        function renderCard(animClass) {
            const stage = document.getElementById('cardStage');
            if (!stage) return;

            const item = cards[current];
            const tag = mode === 'words' ? 'word' : 'letter';
            const hasTTS = !!synth;
            const spellHTML = mode === 'words' ? `<div class="spell-row"></div>` : '';
            const speakHTML = hasTTS ? `<button class="speak-btn" onclick="speakCurrent(event)">${speakerIcon()} hear it</button>` : '';

            stage.innerHTML = `
      <div class="flash-card ${animClass || ''}" onclick="flipCurrent()">
        <div class="card-inner ${isFlipped ? 'flipped-init' : ''}">
          <div class="card-front">
            <div class="card-num">#${current + 1}</div>
            <div class="card-tag">${tag}</div>
            <div class="card-char">${item}</div>
            <div class="card-hint">tap to reveal</div>
          </div>
          <div class="card-back">
            <div class="card-num">#${current + 1}</div>
            <div class="card-char">${item}</div>
            ${spellHTML}
            ${speakHTML}
            <div class="card-hint">${current < cards.length - 1 ? '→ tap to continue' : '✓ done'}</div>
          </div>
        </div>
      </div>
    `;

            // Fit text on front after paint
            requestAnimationFrame(() => {
                fitText(stage.querySelector('.card-front .card-char'));
                fitText(stage.querySelector('.card-back .card-char'));
            });

            // Update nav buttons & dots
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            if (prevBtn) prevBtn.disabled = current === 0;
            if (nextBtn) nextBtn.disabled = current === cards.length - 1;
            renderDots();
        }

        function renderDots() {
            const dotsEl = document.getElementById('navDots');
            if (!dotsEl) return;
            const total = cards.length;
            const maxDots = 9;
            if (total > maxDots) {
                dotsEl.innerHTML = `<span style="font-size:10px;color:var(--muted);letter-spacing:0.1em">${current + 1} / ${total}</span>`;
                return;
            }
            dotsEl.innerHTML = Array.from({ length: total }, (_, i) => {
                const cls = i === current ? 'active' : seen.has(i) ? 'seen' : '';
                return `<div class="nav-dot ${cls}" onclick="jumpTo(${i})"></div>`;
            }).join('');
        }

        function jumpTo(i) {
            if (i === current) return;
            lastDir = i > current ? 1 : -1;
            seen.add(current);
            current = i; isFlipped = false;
            renderCard(lastDir > 0 ? 'enter-right' : 'enter-left');
            updateProgress();
        }

        function updateProgress() {
            seen.add(current); // count current as seen
            const pct = cards.length ? (seen.size / cards.length * 100) : 0;
            const fill = document.getElementById('progressFill');
            if (fill) fill.style.width = pct + '%';
            const label = document.getElementById('counterLabel');
            if (label) label.innerHTML = `<span>${current + 1}</span> / ${cards.length}`;
            renderDots();
        }

        // ── Keyboard nav ──────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (cards.length === 0) return;
            if (e.key === 'ArrowRight') goNext();
            else if (e.key === 'ArrowLeft') goPrev();
            else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCurrent(); }
        });

        function showEmpty(msg) {
            document.getElementById('cardArea').innerHTML = `
      <div class="empty-state"><div class="empty-icon">𑀵</div><p>${msg}</p></div>
    `;
        }

        showEmpty('Expand the paragraph field above,<br>enter Malayalam text, then hit Generate.');
    </script>

    <script>

        function applyThemeVariables(theme) {
            const r = document.documentElement;
            r.style.setProperty('--bg', theme.colors.bg);
            r.style.setProperty('--surface', theme.colors.bg);
            r.style.setProperty('--surface2', 'rgba(128,128,128,0.1)');
            r.style.setProperty('--gold', theme.colors.main);
            r.style.setProperty('--gold-light', theme.colors.main);
            r.style.setProperty('--text', theme.colors.sub);
            r.style.setProperty('--cream', theme.colors.sub);
            r.style.setProperty('--teal', theme.colors.sub);
            r.style.setProperty('--border', 'rgba(128,128,128,0.2)');
        }


        function toggleThemeMenu(e) {
            e.stopPropagation();
            document.getElementById('themeMenu').classList.toggle('show');
            document.getElementById('themeSearch').focus();
        }

        function closeThemeMenu() {
            const menu = document.getElementById('themeMenu');
            if (menu) menu.classList.remove('show');
        }

        document.addEventListener('click', closeThemeMenu);

        function renderThemes(filter = '') {
            const list = document.getElementById('themeList');
            if (!list) return;
            list.innerHTML = '';
            const lowerFilter = filter.toLowerCase();
            themesData.forEach(theme => {
                if (!theme.name.toLowerCase().includes(lowerFilter)) return;
                const div = document.createElement('div');
                div.className = 'theme-item';
                div.innerHTML = `
                    <span>${theme.name.toLowerCase()}</span>
                    <div class="theme-circles">
                        <div class="theme-circle" style="background:${theme.colors.bg}"></div>
                        <div class="theme-circle" style="background:${theme.colors.main}"></div>
                        <div class="theme-circle" style="background:${theme.colors.sub}"></div>
                    </div>
                `;
                div.onclick = () => {
                    applyTheme(theme);
                    closeThemeMenu();
                };
                list.appendChild(div);
            });
        }

        function filterThemes() {
            renderThemes(document.getElementById('themeSearch').value);
        }

        function applyTheme(theme) {
            localStorage.setItem(location.pathname + '-theme', theme.value);
            document.getElementById('currentThemeName').textContent = theme.name.toLowerCase();
            document.getElementById('currentThemeCircles').innerHTML = `
                <div class="theme-circle" style="background:${theme.colors.bg}"></div>
                <div class="theme-circle" style="background:${theme.colors.main}"></div>
                <div class="theme-circle" style="background:${theme.colors.sub}"></div>
            `;
            applyThemeVariables(theme);
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderThemes();
            const saved = localStorage.getItem(location.pathname + '-theme');
            const theme = themesData.find(t => t.value === saved) || themesData[0];
            applyTheme(theme);
        });
    </script>
