<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KG Card Rain</title>
    <style>
        :root {
            --bg0: #f4fbff;
            --bg1: #ddf3ff;
            --card: #ffffff;
            --card-2: #f7fcff;
            --ink: #163447;
            --muted: #5e7f93;
            --line: #c5dfef;
            --accent: #1f9ef8;
            --accent-2: #ff6ea9;
            --good: #1ea567;
            --bad: #d74f4f;
            --pill-bg: rgba(255, 255, 255, 0.88);
            --panel-bg: #fcfeff;
            --game0: #eaf8ff;
            --game1: #d8f1ff;
            --game2: #c4e8ff;
            --shadow: rgba(22, 52, 71, 0.12);
        }

        :root[data-theme="dark"] {
            --bg0: #121f31;
            --bg1: #0c1422;
            --card: #17263a;
            --card-2: #142133;
            --ink: #e8f2ff;
            --muted: #a3bfd8;
            --line: #2d425c;
            --accent: #4ab3ff;
            --accent-2: #ff8bbc;
            --good: #56db94;
            --bad: #ff8787;
            --pill-bg: rgba(17, 28, 44, 0.88);
            --panel-bg: #1a2b41;
            --game0: #23384f;
            --game1: #1b2f45;
            --game2: #18283b;
            --shadow: rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at top, var(--bg0) 0%, var(--bg1) 100%);
            display: grid;
            place-items: center;
            padding: 14px;
        }

        .app {
            width: min(980px, 100%);
            border-radius: 18px;
            overflow: hidden;
            background: var(--card);
            border: 1px solid var(--line);
            box-shadow: 0 12px 34px var(--shadow);
        }

        .head {
            padding: 16px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, var(--card), var(--card-2));
            display: grid;
            gap: 12px;
        }

        .top-tools {
            display: flex;
            justify-content: flex-end;
        }

        .theme-btn {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--card);
            color: var(--ink);
            padding: 8px 12px;
            font-size: 0.86rem;
            font-weight: 800;
            cursor: pointer;
        }

        .title {
            font-size: clamp(1.3rem, 3vw, 2rem);
            font-weight: 800;
            letter-spacing: 0.01em;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .modes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mode-btn {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--muted);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
        }

        .mode-btn.active {
            color: #fff;
            border-color: transparent;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
        }

        .status {
            color: var(--muted);
            font-size: 0.92rem;
            font-weight: 700;
            min-height: 1.3em;
        }

        .status.good {
            color: var(--good);
        }

        .status.bad {
            color: var(--bad);
        }

        .content {
            padding: 16px;
            display: grid;
            gap: 14px;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: var(--panel-bg);
            padding: 12px;
        }

        .panel-title {
            margin: 0 0 10px;
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            color: var(--muted);
            text-transform: uppercase;
            font-weight: 800;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 6px;
            table-layout: fixed;
        }

        td {
            width: 10%;
        }

        .key-btn {
            width: 100%;
            min-height: 50px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--card);
            color: var(--ink);
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.12s ease, background 0.12s ease;
        }

        .key-btn:hover {
            background: color-mix(in srgb, var(--accent) 12%, var(--card));
            transform: translateY(-1px);
        }

        .key-btn:active {
            transform: scale(0.97);
        }

        .key-btn.blank {
            visibility: hidden;
            pointer-events: none;
        }

        .game {
            display: none;
            position: relative;
            height: min(70vh, 560px);
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            background: linear-gradient(180deg, var(--game0) 0%, var(--game1) 56%, var(--game2) 100%);
        }

        .game.active {
            display: block;
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 3;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .pill {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--pill-bg);
            padding: 6px 12px;
            font-size: 0.88rem;
            font-weight: 800;
        }

        .change-btn {
            margin-left: auto;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--card);
            color: var(--ink);
            padding: 7px 10px;
            font-size: 0.82rem;
            font-weight: 800;
            cursor: pointer;
        }

        .basket {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 20px;
            width: 110px;
            height: 70px;
            border-radius: 18px 18px 28px 28px;
            border: 3px solid rgba(112, 71, 33, 0.75);
            background: linear-gradient(180deg, #dfa45e 0%, #b77939 100%);
            box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.25), 0 6px 13px rgba(0, 0, 0, 0.16);
            display: grid;
            place-items: center;
            color: #fff7ea;
            font-size: 0.9rem;
            font-weight: 900;
            z-index: 2;
        }

        .fruit {
            position: absolute;
            top: -72px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.6);
            background: radial-gradient(circle at 36% 25%, #ffe48c 0%, #ffbe48 38%, #ff7e33 100%);
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.12);
            display: grid;
            place-items: center;
            cursor: pointer;
            user-select: none;
            animation: fall linear forwards;
            transform-origin: center bottom;
            z-index: 1;
            --spin-start: 0deg;
            --spin-end: 0deg;
        }

        .fruit::before {
            content: "";
            position: absolute;
            top: -8px;
            left: 21px;
            width: 18px;
            height: 10px;
            border-radius: 80% 20% 80% 20%;
            background: #3bb56b;
            transform: rotate(-20deg);
        }

        .fruit.wrong {
            background: radial-gradient(circle at 35% 25%, #ffc5c5 0%, #ff7a7a 46%, #dc3f3f 100%);
        }

        .fruit.fruit-apple {
            background: radial-gradient(circle at 36% 25%, #ffd3d3 0%, #ff7d7d 45%, #cf3636 100%);
        }

        .fruit.fruit-lemon {
            background: radial-gradient(circle at 36% 25%, #fff8ba 0%, #ffd35d 45%, #ffae33 100%);
        }

        .fruit.fruit-grape {
            background: radial-gradient(circle at 36% 25%, #e4ccff 0%, #b987ff 45%, #7a4acb 100%);
        }

        .fruit.fruit-lime {
            background: radial-gradient(circle at 36% 25%, #d9ffc5 0%, #8ce86b 45%, #3ca343 100%);
        }

        .fruit.fruit-blueberry {
            background: radial-gradient(circle at 36% 25%, #b8d8ff 0%, #5f97ff 45%, #2a57c7 100%);
        }

        .symbol {
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
            letter-spacing: 0.03em;
            line-height: 1;
        }

        .fruit.collecting {
            transition: transform 420ms ease-in, opacity 420ms ease-in;
        }

        .fruit.blast {
            pointer-events: none;
            animation: blast-away 380ms ease-out forwards;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 14px;
            border-radius: 3px;
            opacity: 0;
            pointer-events: none;
            z-index: 4;
            animation: confetti-pop 900ms ease-out forwards;
        }

        @keyframes fall {
            from {
                transform: translateY(-5vh) rotate(var(--spin-start));
            }

            to {
                transform: translateY(90vh) rotate(var(--spin-end));
            }
        }

        @keyframes blast-away {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            38% {
                transform: translate(0, 0) scale(1.42);
                opacity: 1;
            }

            100% {
                transform: translate(var(--blast-x), var(--blast-y)) rotate(var(--blast-rot)) scale(0.07);
                opacity: 0;
            }
        }

        @keyframes confetti-pop {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.65);
                opacity: 0;
            }
        }

        @media (max-width: 700px) {
            .key-btn {
                min-height: 44px;
                font-size: 1rem;
            }

            table {
                border-spacing: 4px;
            }

            .fruit {
                width: 64px;
                height: 64px;
            }

            .symbol {
                font-size: 1.7rem;
            }
        }

        .global-apps-nav {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 99999;
            display: flex;
            gap: 8px;
            background: rgba(30, 30, 35, 0.85);
            padding: 8px 12px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            align-items: center;
        }

        .global-apps-nav .nav-lbl {
            color: #a0a0b0;
            font-family: sans-serif;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-right: 4px;
            letter-spacing: 0.5px;
        }

        .global-apps-nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .global-apps-nav a:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .global-apps-nav {
                left: 50%;
                transform: translateX(-50%);
                bottom: 10px;
                padding: 6px 8px;
                width: 90%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .global-apps-nav .nav-lbl {
                display: none;
            }

            .global-apps-nav a {
                padding: 6px 8px;
                font-size: 11px;
            }
        }
    </style>
    <script src="analytics.js"></script>
</head>

<body>
    <main class="app">
        <section class="head">
            <div class="top-tools">
                <button class="theme-btn" id="themeBtn" type="button">Dark Mode</button>
            </div>
            <div class="title">KG Card Rain</div>
            <div class="subtitle">Choose capital letters, small letters, or numbers. After selection, keyboard hides and
                fruits start raining.</div>
            <div class="modes" id="modeButtons">
                <button class="mode-btn active" data-mode="caps">Capital Letters</button>
                <button class="mode-btn" data-mode="small">Small Letters</button>
                <button class="mode-btn" data-mode="nums">Numbers</button>
            </div>
            <div class="status" id="status">Select a key to start raining fruits.</div>
        </section>

        <section class="content">
            <section class="panel" id="selectorPanel">
                <h2 class="panel-title">QWERTY Keyboard Table</h2>
                <table id="keyboardTable" aria-label="QWERTY keyboard"></table>
            </section>

            <section class="game" id="gameArea">
                <div class="hud">
                    <div class="pill" id="targetPill">Target: -</div>
                    <div class="pill" id="caughtPill">Caught: 0</div>
                    <button class="change-btn" id="changeBtn">Pick Another Key</button>
                </div>
                <div class="basket" id="basket">Basket</div>
            </section>
        </section>
    </main>

    <script>
        const KEY_LAYOUTS = {
            caps: [
                ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
                ["", "A", "S", "D", "F", "G", "H", "J", "K", "L"],
                ["", "", "Z", "X", "C", "V", "B", "N", "M", ""]
            ],
            small: [
                ["q", "w", "e", "r", "t", "y", "u", "i", "o", "p"],
                ["", "a", "s", "d", "f", "g", "h", "j", "k", "l"],
                ["", "", "z", "x", "c", "v", "b", "n", "m", ""]
            ],
            nums: [
                ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"],
                ["", "", "", "", "", "", "", "", "", ""],
                ["", "", "", "", "", "", "", "", "", ""]
            ]
        };

        const state = {
            mode: "caps",
            target: null,
            raining: false,
            timer: null,
            caught: 0,
            theme: "light",
            roundComplete: false,
            nextRoundTimer: null
        };

        const FRUIT_VARIANTS = [
            "fruit-apple",
            "fruit-lemon",
            "fruit-grape",
            "fruit-lime",
            "fruit-blueberry"
        ];

        const keyboardTable = document.getElementById("keyboardTable");
        const selectorPanel = document.getElementById("selectorPanel");
        const gameArea = document.getElementById("gameArea");
        const targetPill = document.getElementById("targetPill");
        const caughtPill = document.getElementById("caughtPill");
        const basket = document.getElementById("basket");
        const status = document.getElementById("status");
        const themeBtn = document.getElementById("themeBtn");
        let audioContext = null;

        function setTheme(theme) {
            state.theme = theme;
            document.documentElement.setAttribute("data-theme", theme);
            themeBtn.textContent = theme === "dark" ? "Light Mode" : "Dark Mode";
            window.localStorage.setItem("kg-card-rain-theme", theme);
        }

        function initTheme() {
            const saved = window.localStorage.getItem("kg-card-rain-theme");
            if (saved === "dark" || saved === "light") {
                setTheme(saved);
                return;
            }

            setTheme("light");
        }

        function setStatus(text, tone) {
            status.textContent = text;
            status.className = "status" + (tone ? " " + tone : "");
        }

        function setMode(nextMode) {
            state.mode = nextMode;
            document.querySelectorAll(".mode-btn").forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.mode === nextMode);
            });
            renderKeyboard();
        }

        function stopRain() {
            state.raining = false;
            if (state.timer) {
                window.clearInterval(state.timer);
                state.timer = null;
            }
        }

        function stopNextRoundTimer() {
            if (state.nextRoundTimer) {
                window.clearTimeout(state.nextRoundTimer);
                state.nextRoundTimer = null;
            }
        }

        function clearFruits() {
            gameArea.querySelectorAll(".fruit").forEach((fruit) => fruit.remove());
        }

        function backToSelection() {
            stopRain();
            stopNextRoundTimer();
            clearFruits();
            state.target = null;
            state.roundComplete = false;
            selectorPanel.style.display = "block";
            gameArea.classList.remove("active");
            targetPill.textContent = "Target: -";
            caughtPill.textContent = "Caught: 0";
            setStatus("Select a key to start raining fruits.");
        }

        function startRainForTarget(target) {
            stopNextRoundTimer();
            state.target = target;
            state.caught = 0;
            state.roundComplete = false;
            targetPill.textContent = "Target: " + target;
            caughtPill.textContent = "Caught: 0";
            selectorPanel.style.display = "none";
            gameArea.classList.add("active");
            setStatus("Tap fruits with " + target + " to collect in basket.");

            stopRain();
            state.raining = true;
            state.timer = window.setInterval(spawnFruit, 520);
        }

        function spawnFruit() {
            if (!state.target || state.roundComplete) return;

            const fruit = document.createElement("button");
            fruit.type = "button";
            fruit.className = "fruit";
            fruit.classList.add(FRUIT_VARIANTS[Math.floor(Math.random() * FRUIT_VARIANTS.length)]);

            const rows = KEY_LAYOUTS[state.mode].flat().filter(Boolean);
            const symbol = Math.random() < 0.23
                ? state.target
                : rows[Math.floor(Math.random() * rows.length)];
            fruit.dataset.symbol = symbol;

            const mark = document.createElement("span");
            mark.className = "symbol";
            mark.textContent = symbol;
            fruit.appendChild(mark);

            const pad = 72;
            const maxX = Math.max(pad, gameArea.clientWidth - pad);
            fruit.style.left = Math.floor(Math.random() * maxX) + "px";
            fruit.style.animationDuration = (4 + Math.random() * 2.4).toFixed(2) + "s";
            const spinStart = -24 + Math.random() * 48;
            const spinEnd = -90 + Math.random() * 180;
            fruit.style.setProperty("--spin-start", spinStart.toFixed(1) + "deg");
            fruit.style.setProperty("--spin-end", spinEnd.toFixed(1) + "deg");

            fruit.addEventListener("click", () => onFruitSelected(fruit));
            fruit.addEventListener("animationend", () => fruit.remove());

            gameArea.appendChild(fruit);
        }

        function animateCollectToBasket(fruit) {
            const fruitRect = fruit.getBoundingClientRect();
            const hostRect = gameArea.getBoundingClientRect();
            const basketRect = basket.getBoundingClientRect();

            fruit.style.animation = "none";
            fruit.style.left = (fruitRect.left - hostRect.left) + "px";
            fruit.style.top = (fruitRect.top - hostRect.top) + "px";
            fruit.classList.add("collecting");

            const fromX = fruitRect.left + fruitRect.width / 2;
            const fromY = fruitRect.top + fruitRect.height / 2;
            const toX = basketRect.left + basketRect.width / 2;
            const toY = basketRect.top + basketRect.height / 2;
            const dx = toX - fromX;
            const dy = toY - fromY;

            requestAnimationFrame(() => {
                fruit.style.transform = "translate(" + dx + "px, " + dy + "px) scale(0.16)";
                fruit.style.opacity = "0";
            });

            fruit.addEventListener("transitionend", () => fruit.remove(), { once: true });
        }

        function speakCaughtSymbol(symbol) {
            if (!("speechSynthesis" in window)) return;

            const utterance = new SpeechSynthesisUtterance(symbol);
            utterance.rate = 0.95;
            utterance.pitch = 1.02;
            utterance.volume = 1;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        function playBuzzer() {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx) return;

            if (!audioContext) {
                audioContext = new Ctx();
            }

            if (audioContext.state === "suspended") {
                audioContext.resume();
            }

            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const osc2 = audioContext.createOscillator();
            const gain = audioContext.createGain();
            const filter = audioContext.createBiquadFilter();

            filter.type = "lowpass";
            filter.frequency.setValueAtTime(1400, now);
            osc.type = "sawtooth";
            osc2.type = "square";
            osc.frequency.setValueAtTime(230, now);
            osc.frequency.exponentialRampToValueAtTime(120, now + 0.42);
            osc2.frequency.setValueAtTime(180, now);
            osc2.frequency.exponentialRampToValueAtTime(95, now + 0.42);

            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(0.11, now + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.08, now + 0.26);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);

            osc.connect(filter);
            osc2.connect(filter);
            filter.connect(gain);
            gain.connect(audioContext.destination);

            osc.start(now);
            osc2.start(now + 0.01);
            osc.stop(now + 0.52);
            osc2.stop(now + 0.5);
        }

        function animateWrongBlast(fruit) {
            const fruitRect = fruit.getBoundingClientRect();
            const hostRect = gameArea.getBoundingClientRect();
            const centerX = hostRect.left + hostRect.width / 2;

            fruit.style.animation = "none";
            fruit.style.left = (fruitRect.left - hostRect.left) + "px";
            fruit.style.top = (fruitRect.top - hostRect.top) + "px";

            const direction = fruitRect.left < centerX ? -1 : 1;
            const blastX = direction * (85 + Math.random() * 150);
            const blastY = -(70 + Math.random() * 140);
            const blastRot = (-180 + Math.random() * 360).toFixed(1) + "deg";

            fruit.style.setProperty("--blast-x", blastX.toFixed(1) + "px");
            fruit.style.setProperty("--blast-y", blastY.toFixed(1) + "px");
            fruit.style.setProperty("--blast-rot", blastRot);

            fruit.classList.remove("collecting");
            fruit.style.animation = "";
            requestAnimationFrame(() => {
                fruit.classList.add("wrong", "blast");
            });
        }

        function fireConfettiBurst(side) {
            const colors = ["#ff6a6a", "#ffd54a", "#5cd67a", "#6bb6ff", "#d690ff", "#ff8fbd"];
            const xBase = side === "left" ? 24 : gameArea.clientWidth - 24;
            const spread = side === "left" ? 1 : -1;

            for (let i = 0; i < 34; i += 1) {
                const bit = document.createElement("span");
                bit.className = "confetti";
                bit.style.background = colors[Math.floor(Math.random() * colors.length)];
                bit.style.left = xBase + "px";
                bit.style.bottom = "18px";
                bit.style.width = (6 + Math.random() * 8).toFixed(1) + "px";
                bit.style.height = (8 + Math.random() * 10).toFixed(1) + "px";
                const dx = spread * (28 + Math.random() * 150);
                const dy = -(90 + Math.random() * 220);
                const rot = (-360 + Math.random() * 720).toFixed(1) + "deg";
                bit.style.setProperty("--dx", dx.toFixed(1) + "px");
                bit.style.setProperty("--dy", dy.toFixed(1) + "px");
                bit.style.setProperty("--rot", rot);
                bit.style.animationDuration = (760 + Math.random() * 420).toFixed(0) + "ms";
                bit.style.animationDelay = (Math.random() * 140).toFixed(0) + "ms";
                bit.addEventListener("animationend", () => bit.remove(), { once: true });
                gameArea.appendChild(bit);
            }
        }

        function celebrateRoundComplete() {
            state.roundComplete = true;
            stopRain();
            clearFruits();
            setStatus("Awesome! 10 fruits caught. Pick next key.", "good");
            fireConfettiBurst("left");
            fireConfettiBurst("right");
            state.nextRoundTimer = window.setTimeout(() => {
                backToSelection();
            }, 1600);
        }

        function onFruitSelected(fruit) {
            if (state.roundComplete) return;

            const chosen = fruit.dataset.symbol;
            if (chosen === state.target) {
                animateCollectToBasket(fruit);
                state.caught += 1;
                caughtPill.textContent = "Caught: " + state.caught;
                speakCaughtSymbol(chosen);
                setStatus("Great! " + chosen + " collected.", "good");

                if (state.caught >= 10) {
                    celebrateRoundComplete();
                }
                return;
            }

            fruit.disabled = true;
            speakCaughtSymbol(chosen);
            playBuzzer();
            animateWrongBlast(fruit);
            setStatus("Oops, you need " + state.target + ".", "bad");
        }

        function renderKeyboard() {
            keyboardTable.innerHTML = "";
            const rows = KEY_LAYOUTS[state.mode];

            rows.forEach((row) => {
                const tr = document.createElement("tr");
                row.forEach((cell) => {
                    const td = document.createElement("td");
                    const btn = document.createElement("button");
                    btn.type = "button";
                    btn.className = "key-btn";

                    if (!cell) {
                        btn.classList.add("blank");
                        btn.setAttribute("aria-hidden", "true");
                        btn.tabIndex = -1;
                        btn.textContent = "";
                    } else {
                        btn.textContent = cell;
                        btn.addEventListener("click", () => startRainForTarget(cell));
                    }

                    td.appendChild(btn);
                    tr.appendChild(td);
                });
                keyboardTable.appendChild(tr);
            });
        }

        document.getElementById("modeButtons").addEventListener("click", (event) => {
            const modeBtn = event.target.closest(".mode-btn");
            if (!modeBtn) return;
            setMode(modeBtn.dataset.mode);
        });

        document.getElementById("changeBtn").addEventListener("click", backToSelection);
        themeBtn.addEventListener("click", () => {
            setTheme(state.theme === "dark" ? "light" : "dark");
        });

        initTheme();
        renderKeyboard();
    </script>
